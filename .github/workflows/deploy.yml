name: CI-CD Docker Hub + EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    # 🔐 Login Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build & Push Image
    - name: Build and Push Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-monitoring-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/flask-monitoring-app:latest

    # 🔑 Setup SSH
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    # 🚀 Deploy on EC2
    - name: Deploy to EC2
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          # Clone repo if not exists
          
          if [ ! -d "<repo-name>" ]; then
            git clone https://github.com/<your-username>/<repo-name>.git
          fi

          cd <repo-name>

          git pull origin main

          docker pull <your-docker-username>/flask-monitoring-app:latest

          docker-compose down
          docker-compose up -d

        EOF